name: Auto-format

on:
  push:
    branches: ["**"]

permissions:
  contents: write

concurrency:
  group: auto-format-${{ github.ref }}
  cancel-in-progress: false

jobs:
  format:
    name: Format pushed branch
    if: ${{ !endsWith(github.actor, '[bot]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out pushed branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.12"
          enable-cache: true

      - name: Install TypeScript dependencies
        run: npm ci

      - name: Format maintained sources
        run: scripts/format_all.sh

      - name: Verify formatted browser output
        run: |
          npm run verify
          git diff --check

      - name: Commit formatting changes
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No formatting changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "style: auto-format"
          git push origin "HEAD:${GITHUB_REF_NAME}"
