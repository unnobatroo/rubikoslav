name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync locked uv environment
        run: uv sync --locked

      - name: Test Python package and CLI
        run: uv run python -m unittest discover -s python/tests -v

      - name: Run packaged-engine doctor
        run: uv run rubikoslav doctor --strict

      - name: Build wheel and source distribution
        run: uv build

      - name: Configure native test build
        run: cmake -S . -B build/native -DRUBIKOSLAV_BUILD_PYTHON=OFF -DRUBIKOSLAV_WARNINGS_AS_ERRORS=ON

      - name: Build native targets
        run: cmake --build build/native --config Release --parallel

      - name: Run native tests
        run: ctest --test-dir build/native -C Release --output-on-failure
