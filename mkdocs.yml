site_name: Rubikoslav
site_description: Python and C++20 Rubik's Cube solver with native route verification
site_url: https://unnobatroo.github.io/rubikoslav/
repo_url: https://github.com/unnobatroo/rubikoslav
repo_name: unnobatroo/rubikoslav
edit_uri: edit/main/docs/
site_dir: build/docs

theme:
  name: material
  favicon: assets/favicon.svg
  logo: assets/favicon.svg
  font:
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: slate
    primary: black
    accent: light green
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight

nav:
  - Start here:
      - Overview: index.md
      - Installation and quickstart: getting-started.md
  - Python:
      - API reference: python-api.md
      - CLI and visualizer: cli.md
      - Production usage: production.md
  - Internals:
      - Architecture: architecture.md
      - C++ API: cpp-api.md
  - Project:
      - Development: development.md
      - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

copyright: 'Created by <a href="https://jalols.page/" rel="noopener">Jaloliddin Ismailov</a>'
