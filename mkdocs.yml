site_name: Rubikoslav
site_description: Python and C++20 Rubik's Cube solver with native route verification
site_url: https://unnobatroo.github.io/rubikoslav/
repo_url: https://github.com/unnobatroo/rubikoslav
repo_name: unnobatroo/rubikoslav
edit_uri: edit/main/docs/
site_dir: build/docs

theme:
  name: material
  favicon: assets/favicon.svg
  logo: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    scheme: slate
    primary: black
    accent: light green
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight

nav:
  - Overview: index.md
  - Getting started: getting-started.md
  - Visualizer: visualizer.md
  - Python API: python-api.md
  - C++ API: cpp-api.md
  - Architecture: architecture.md
  - Development: development.md
  - Publishing: publishing.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

copyright: Created by Jaloliddin Ismailov · GPL-3.0
